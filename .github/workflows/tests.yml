name: tests

on:
  schedule:
    - cron: "0 3 1 */2 *"  # 03:00 on the first of every second

  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "info"
      tags:
        required: false
        description: "Test scenario tags"
  push:
    branches:
      - master
  pull_request:
    branches:

jobs:
  tests:
    name: Replay ${{ matrix.replay-file }}
    runs-on: ubuntu-latest
    env:
      REPLAY_FILE: ${{ matrix.replay-file }}
    strategy:
      fail-fast: false
      matrix:
        replay-file: [ 'stable', 'default', 'master' ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14 with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'

      - name: Start Docker database
        shell: bash
        run: docker run -d -p 5002:5432 rsundqvist/sakila-preload:postgres

      - name: Install the project
        run: |
          uv sync --locked --all-extras
          uv tree

      - name: Lint
        shell: bash
        run: uv run dev/lint.sh

      - name: Run tests
        shell: bash
        run: |
          echo "REPLAY_FILE=$REPLAY_FILE"
          uv run pytest --color=yes tests/
